apiVersion: v1
kind: Namespace
metadata:
  name: APP_NAMESPACE
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-exam-app
  namespace: APP_NAMESPACE
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-exam-app
  template:
    metadata:
      labels:
        app: devops-exam-app
    spec:
      containers:
      - name: devops-exam-app
        image: APP_IMAGE
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: devops-exam-service
  namespace: APP_NAMESPACE
spec:
  type: NodePort
  selector:
    app: devops-exam-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
      nodePort: APP_NODE_PORT