name: Deploy App (Task 3)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Виберіть середовище для розгортання'
        required: true
        type: choice
        options:
          - dev
          - release
      target_ip:
        description: 'IP-адреса сервера (Droplet)'
        required: true
        type: string

env:
  # Налаштування змінних залежно від вибраного середовища
  GIT_REF: ${{ github.event.inputs.environment == 'dev' && 'develop' || '1.0.0' }}
  APP_PORT: ${{ github.event.inputs.environment == 'dev' && '8002' || '8003' }}
  IMAGE_TAG: ${{ github.event.inputs.environment == 'dev' && 'develop' || '1.0.0' }}
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/devops-exam-pt2

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      # ЗВЕРНІТЬ УВАГУ: Ми клонуємо репозиторій ВИКЛАДАЧА, а не ваш!
      - name: Checkout Teacher's Repo
        uses: actions/checkout@v4
        with:
          repository: 'YulianSalo/devops-exam-pt2'
          ref: ${{ env.GIT_REF }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

  deploy-to-minikube:
    name: Deploy to Minikube
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # Тут ми клонуємо ВАШ репозиторій, щоб дістати k8s маніфест
      - name: Checkout My Repo
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ github.event.inputs.target_ip }} >> ~/.ssh/known_hosts

      - name: Prepare & Copy Manifest
        run: |
          # Замінюємо заглушки в файлі на реальні значення
          sed -i "s|APP_NAMESPACE|${{ github.event.inputs.environment }}|g" task3/app-manifest-template.yml
          sed -i "s|APP_IMAGE|${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}|g" task3/app-manifest-template.yml
          
          # Копіюємо готовий файл на сервер
          scp task3/app-manifest-template.yml root@${{ github.event.inputs.target_ip }}:/root/app-manifest.yml

      - name: Validation Check (Dry Run)
        run: |
          # ПЕРЕВІРКА перед реальним розгортанням (вимога екзамену)
          ssh root@${{ github.event.inputs.target_ip }} "kubectl apply -f /root/app-manifest.yml --dry-run=client"

      - name: Deploy to Kubernetes
        run: |
          # Реальне розгортання
          ssh root@${{ github.event.inputs.target_ip }} "kubectl apply -f /root/app-manifest.yml"
          
          # Очікуємо запуску подів
          ssh root@${{ github.event.inputs.target_ip }} "kubectl wait --for=condition=ready pod -l app=devops-exam-app -n ${{ github.event.inputs.environment }} --timeout=60s"

      - name: Setup Port Forwarding
        run: |
          # Вбиваємо старий процес port-forward для цього порту, якщо він був
          ssh root@${{ github.event.inputs.target_ip }} "fuser -k ${{ env.APP_PORT }}/tcp || true"
          
          # Запускаємо новий port-forward у фоні (nohup)
          ssh root@${{ github.event.inputs.target_ip }} "nohup kubectl port-forward svc/devops-exam-service ${{ env.APP_PORT }}:80 -n ${{ github.event.inputs.environment }} --address 0.0.0.0 > /root/port-forward-${{ github.event.inputs.environment }}.log 2>&1 &"
          
          # Даємо секунду на запуск
          sleep 3